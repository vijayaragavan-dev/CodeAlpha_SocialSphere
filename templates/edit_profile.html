{% extends "base.html" %}
{% block title %}Edit Profile - SocialSphere{% endblock %}

{% block content %}
<div class="edit-profile-wrapper">
  <div class="edit-profile-card">
    <h2>Edit Profile</h2>
    <form method="POST" enctype="multipart/form-data">
      <div class="form-group">
        <label for="bio">Bio</label>
        <textarea id="bio" name="bio" placeholder="Tell us about yourself..." maxlength="500">{{ current_user.bio or '' }}</textarea>
        <small style="color: var(--text-secondary); font-size: 0.8rem;">Maximum 500 characters</small>
      </div>

      <div class="form-group">
        <label for="profile_image">Profile Picture</label>
        <div class="file-upload">
          <label for="profile_image" class="file-upload-label">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <circle cx="8.5" cy="8.5" r="1.5"></circle>
              <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            Choose Image
          </label>
          <input type="file" id="profile_image" name="profile_image" accept="image/png,image/jpg,image/jpeg,image/gif,image/webp">
          <div id="fileName" class="file-name"></div>
        </div>
        <img id="imagePreview" class="image-preview" alt="Preview">
        <small style="color: var(--text-secondary); font-size: 0.8rem;">Allowed: PNG, JPG, JPEG, GIF, WebP (max 16MB)</small>
      </div>

      <div style="display: flex; gap: 12px; margin-top: 24px;">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('profile', username=current_user.username) }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
