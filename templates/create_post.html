{% extends "base.html" %}
{% block title %}Create Post - SocialSphere{% endblock %}

{% block content %}
<div class="create-post-wrapper">
  <div class="create-post-card">
    <h2>Create Post</h2>
    <form method="POST" enctype="multipart/form-data">
      <div class="form-group">
        <label for="content">What's on your mind?</label>
        <textarea id="content" name="content" placeholder="Share your thoughts..." maxlength="2000" rows="4">{{ request.form.content or '' }}</textarea>
        <small style="color: var(--text-secondary); font-size: 0.8rem;">Maximum 2000 characters</small>
      </div>

      <div class="form-group">
        <label for="imageInput">Add Image (optional)</label>
        <div class="file-upload">
          <label for="imageInput" class="file-upload-label">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <circle cx="8.5" cy="8.5" r="1.5"></circle>
              <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            Choose Image
          </label>
          <input type="file" id="imageInput" name="image" accept="image/png,image/jpg,image/jpeg,image/gif,image/webp">
          <div id="fileName" class="file-name"></div>
        </div>
        <img id="imagePreview" class="image-preview" alt="Preview">
        <small style="color: var(--text-secondary); font-size: 0.8rem;">Allowed: PNG, JPG, JPEG, GIF, WebP (max 16MB)</small>
      </div>

      <div style="display: flex; gap: 12px;">
        <button type="submit" class="btn btn-primary">Post</button>
        <a href="{{ url_for('index') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
